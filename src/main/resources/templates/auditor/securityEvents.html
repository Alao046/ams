<!DOCTYPE html>
<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Security Events</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">

    <script id="tailwind-config">
        tailwind.config = {
          darkMode: 'class',
          theme: {
            extend: {
              colors: {
                'primary': '#000000',
                'surface': '#f7f9fb',
                'secondary-fixed': '#d0e1fb',
                'on-secondary-fixed-variant': '#38485d',
                'surface-container-low': '#f2f4f6',
                'surface-container-high': '#e6e8ea',
                'outline-variant': '#cfc4c5',
                'error-container': '#ffdad6',
                'on-error-container': '#93000a'
              },
              spacing: {
                'card-padding': '24px',
                'outer-padding': '32px'
              }
            }
          }
        }
    </script>

    <style>
        body {
            background-color: #f7f9fb;
            font-family: 'Hanken Grotesk', sans-serif;
            color: #191c1e;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
            line-height: 1;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="text-on-surface flex h-screen overflow-hidden">

<aside th:replace="~{layouts/auditorLayout :: sidebar('securityEvents')}"></aside>

<div class="flex-1 flex flex-col overflow-hidden">

    <header class="bg-surface border-b border-gray-200 flex justify-between items-center w-full px-outer-padding h-16 sticky top-0 z-40 shrink-0">
        <div class="flex items-center gap-4">
            <span class="font-bold">Security Events</span>
        </div>

    </header>

    <main class="flex-1 overflow-y-auto px-outer-padding py-6">
        <div class="mb-6">
            <h1 class="text-2xl font-bold">Security Event Logging</h1>
            <p class="text-sm text-gray-600">Monitoring authentication events, unauthorized access attempts and security-related activities.</p>
        </div>

        <section class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div>
                <label class="block text-sm font-semibold mb-1">Severity</label>
                <select id="severityFilter" class="w-full border rounded px-3 py-2 bg-white" onchange="applySecurityFilters()">
                    <option value="">All Severities</option>
                    <option value="CRITICAL">Critical</option>
                    <option value="HIGH">High</option>
                    <option value="MEDIUM">Medium</option>
                    <option value="LOW">Low</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Event Type</label>
                <select id="eventTypeFilter" class="w-full border rounded px-3 py-2 bg-white" onchange="applySecurityFilters()">
                    <option value="">All Events</option>
                    <option value="LOGIN_ATTEMPT">Login Attempt</option>
                    <option value="UNAUTHORIZED_ACCESS">Unauthorized Access</option>
                    <option value="MULTIPLE_LOGIN_ATTEMPTS">Multiple Login Attempts</option>
                    <option value="PERMISSION_CHANGE">Permission Change</option>
                    <option value="DATA_ACCESS">Data Access</option>
                    <option value="DATA_MODIFICATION">Data Modification</option>
                    <option value="DATA_DELETION">Data Deletion</option>
                    <option value="CONFIGURATION_CHANGE">Configuration Change</option>
                    <option value="SUSPICIOUS_ACTIVITY">Suspicious Activity</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Acknowledgment</label>
                <select id="statusFilter" class="w-full border rounded px-3 py-2 bg-white" onchange="applySecurityFilters()">
                    <option value="">All</option>
                    <option value="unacknowledged">Unacknowledged</option>
                    <option value="acknowledged">Acknowledged</option>
                </select>
            </div>
            <div class="flex items-end">
                <button class="w-full border rounded px-4 py-2 bg-white hover:bg-gray-50 transition-colors" onclick="resetSecurityFilters()">Reset Filters</button>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-outer-padding">
            <div class="lg:col-span-2 bg-white border rounded-xl shadow-sm overflow-hidden flex flex-col justify-between">
                <div class="overflow-x-auto custom-scrollbar">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="px-4 py-3 text-sm font-semibold text-gray-700">Timestamp</th>
                            <th class="px-4 py-3 text-sm font-semibold text-gray-700">Title</th>
                            <th class="px-4 py-3 text-sm font-semibold text-gray-700">Event Type</th>
                            <th class="px-4 py-3 text-sm font-semibold text-gray-700">Severity</th>
                            <th class="px-4 py-3 text-sm font-semibold text-gray-700">Status</th>
                            <th class="px-4 py-3 text-sm font-semibold text-gray-700">Action</th>
                        </tr>
                        </thead>
                        <tbody id="securityEventTableBody" class="divide-y divide-gray-100">
                        <tr><td colspan="6" class="py-8 text-center text-gray-500">Loading security events...</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="px-4 py-3 border-t flex items-center justify-between bg-gray-50">
                    <div class="text-sm text-gray-600" id="eventsPaginationInfo">Loading...</div>
                    <div id="eventsPaginationControls" class="flex gap-2"></div>
                </div>
            </div>

            <div class="bg-white border rounded-xl p-card-padding shadow-sm h-fit">
                <div class="mb-4">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-sm text-gray-600 font-semibold tracking-wider">CRITICAL EVENTS</span>
                        <span id="criticalCount" class="text-red-600 font-bold">0</span>
                    </div>
                    <div class="h-2 bg-gray-100 rounded overflow-hidden"><div id="criticalBar" class="h-full bg-red-600 transition-all duration-300" style="width:0%"></div></div>
                </div>
                <div class="mb-4">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-sm text-gray-600 font-semibold tracking-wider">HIGH EVENTS</span>
                        <span id="highCount" class="text-amber-600 font-bold">0</span>
                    </div>
                    <div class="h-2 bg-gray-100 rounded overflow-hidden"><div id="highBar" class="h-full bg-amber-600 transition-all duration-300" style="width:0%"></div></div>
                </div>
                <div class="mb-4">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-sm text-gray-600 font-semibold tracking-wider">UNACKNOWLEDGED</span>
                        <span id="unacknowledgedCount" class="text-gray-700 font-bold">0</span>
                    </div>
                    <div class="h-2 bg-gray-100 rounded overflow-hidden"><div id="unacknowledgedBar" class="h-full bg-primary transition-all duration-300" style="width:0%"></div></div>
                </div>
                <div class="mt-6 pt-4 border-t border-gray-100">
                    <div class="flex items-center justify-between gap-3">
                        <div>
                            <div class="text-3xl font-bold tracking-tight" id="uniqueIPCount">0</div>
                            <div class="text-xs text-gray-500 font-medium">unique IPs</div>
                        </div>
                        <div>
                            <button class="bg-primary text-white px-4 py-2 rounded-lg font-semibold text-sm flex items-center gap-2 hover:opacity-90 active:opacity-80 transition-all" onclick="exportSecurityEvents()">
                                <span class="material-symbols-outlined text-[18px]">download</span> Export
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const API_BASE = '/api/auditor';
    const DEFAULT_ORG_ID = 1;
    let allSecurityEvents = [];
    let currentPage = 1;
    const ITEMS_PER_PAGE = 8;

    async function loadSecurityEvents() {
        try {
            const [recentRes, unackRes] = await Promise.all([
                fetch(`${API_BASE}/security-events/org/${DEFAULT_ORG_ID}/date-range?startDate=${new Date(Date.now() - 7*24*60*60*1000).toISOString()}&endDate=${new Date().toISOString()}`),
                fetch(`${API_BASE}/security-events/org/${DEFAULT_ORG_ID}/unacknowledged`)
            ]);

            const recent = recentRes.ok ? await recentRes.json() : [];
            const unack = unackRes.ok ? await unackRes.json() : [];

            const map = new Map();
            recent.forEach(e => map.set(e.id, e));
            unack.forEach(e => map.set(e.id, e));
            allSecurityEvents = Array.from(map.values());
            allSecurityEvents.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            currentPage = 1;
            updateThreatMetrics();
            displaySecurityEvents();
        } catch (err) {
            console.error('Error loading security events', err);
            document.getElementById('securityEventTableBody').innerHTML = '<tr><td colspan="6" class="py-8 text-center text-red-600">Failed to load events</td></tr>';
        }
    }

    function applySecurityFilters() {
        const severity = document.getElementById('severityFilter').value;
        const eventType = document.getElementById('eventTypeFilter').value;
        const status = document.getElementById('statusFilter').value;

        let filtered = allSecurityEvents.slice();
        if (severity) filtered = filtered.filter(e => e.severity === severity);
        if (eventType) filtered = filtered.filter(e => e.eventType === eventType);
        if (status === 'acknowledged') filtered = filtered.filter(e => e.acknowledged === true);
        if (status === 'unacknowledged') filtered = filtered.filter(e => e.acknowledged === false);

        currentPage = 1;
        renderPage(filtered);
    }

    function resetSecurityFilters() {
        document.getElementById('severityFilter').value = '';
        document.getElementById('eventTypeFilter').value = '';
        document.getElementById('statusFilter').value = '';
        loadSecurityEvents();
    }

    function displaySecurityEvents() { renderPage(allSecurityEvents); }

    function renderPage(list) {
        const tbody = document.getElementById('securityEventTableBody');
        const start = (currentPage - 1) * ITEMS_PER_PAGE;
        const pageItems = list.slice(start, start + ITEMS_PER_PAGE);

        if (pageItems.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="py-8 text-center text-gray-500">No security events found</td></tr>';
        } else {
            tbody.innerHTML = pageItems.map(e => `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="px-4 py-3 text-sm">${new Date(e.createdAt).toLocaleString()}</td>
                    <td class="px-4 py-3 text-sm font-semibold text-gray-900">${escapeHtml(e.title || 'Security Event')}</td>
                    <td class="px-4 py-3 text-sm text-gray-600">${escapeHtml(e.eventType || 'UNKNOWN')}</td>
                    <td class="px-4 py-3 text-sm"><span class="px-2 py-0.5 rounded-full text-xs font-bold uppercase ${getSeverityClass(e.severity)}">${e.severity || ''}</span></td>
                    <td class="px-4 py-3 text-sm">${e.acknowledged ? '<span class="text-green-700 font-bold text-xs">ACKNOWLEDGED</span>' : '<span class="text-red-700 font-bold text-xs">PENDING</span>'}</td>
                    <td class="px-4 py-3 text-sm">${!e.acknowledged ? `<button class="text-primary font-bold text-sm hover:underline" onclick="acknowledgeEvent(${e.id})">Acknowledge</button>` : '—'}</td>
                </tr>
            `).join('');
        }

        updateSecurityPagination(list.length);
    }

    function getSeverityClass(sev) {
        switch (sev) {
            case 'CRITICAL': return 'bg-red-50 text-red-700 border border-red-100';
            case 'HIGH': return 'bg-amber-50 text-amber-700 border border-amber-100';
            case 'MEDIUM': return 'bg-blue-50 text-blue-700 border border-blue-100';
            case 'LOW': return 'bg-slate-100 text-slate-600 border border-slate-200';
            default: return 'bg-slate-100 text-slate-600 border border-slate-200';
        }
    }

    function updateThreatMetrics() {
        const critical = allSecurityEvents.filter(e => e.severity === 'CRITICAL').length;
        const high = allSecurityEvents.filter(e => e.severity === 'HIGH').length;
        const unack = allSecurityEvents.filter(e => !e.acknowledged).length;
        const uniqueIPs = new Set(allSecurityEvents.map(e => e.ipAddress)).size;

        document.getElementById('criticalCount').textContent = critical;
        document.getElementById('highCount').textContent = high;
        document.getElementById('unacknowledgedCount').textContent = unack;
        document.getElementById('uniqueIPCount').textContent = uniqueIPs;

        const max = Math.max(critical, high, unack, 1);
        document.getElementById('criticalBar').style.width = (critical / max * 100) + '%';
        document.getElementById('highBar').style.width = (high / max * 100) + '%';
        document.getElementById('unacknowledgedBar').style.width = (unack / max * 100) + '%';
    }

    function updateSecurityPagination(totalItems) {
        const totalPages = Math.max(1, Math.ceil((totalItems || allSecurityEvents.length) / ITEMS_PER_PAGE));
        document.getElementById('eventsPaginationInfo').textContent = `Showing ${Math.min(ITEMS_PER_PAGE, (totalItems || allSecurityEvents.length))} of ${(totalItems || allSecurityEvents.length)} events`;
        const controls = document.getElementById('eventsPaginationControls'); controls.innerHTML = '';
        if (totalPages <= 1) return;

        const prev = document.createElement('button');
        prev.textContent = 'Previous';
        prev.disabled = currentPage === 1;
        prev.className = 'px-3 py-1 text-sm bg-white border rounded-lg disabled:opacity-40 hover:bg-gray-50';
        prev.onclick = () => { currentPage--; applySecurityFilters(); };

        const next = document.createElement('button');
        next.textContent = 'Next';
        next.disabled = currentPage === totalPages;
        next.className = 'px-3 py-1 text-sm bg-white border rounded-lg disabled:opacity-40 hover:bg-gray-50';
        next.onclick = () => { currentPage++; applySecurityFilters(); };

        controls.appendChild(prev);
        controls.appendChild(next);
    }

    async function acknowledgeEvent(eventId) {
        try {
            const res = await fetch(`${API_BASE}/security-events/${eventId}/acknowledge`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ acknowledgedBy: 'auditor-ui' }) });
            if (res.ok) loadSecurityEvents(); else console.error('Ack failed', res.status);
        } catch (err) { console.error('Ack error', err); }
    }

    function exportSecurityEvents() {
        let csv = 'Timestamp,Title,Event Type,Severity,Acknowledged,IP Address\n';
        allSecurityEvents.forEach(e => {
            csv += `"${new Date(e.createdAt).toLocaleString()}","${(e.title||'').replace(/"/g,'""')}","${e.eventType||''}","${e.severity||''}","${e.acknowledged? 'Yes':'No'}","${e.ipAddress||''}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `security_events_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function escapeHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    document.addEventListener('DOMContentLoaded', () => { loadSecurityEvents(); setInterval(loadSecurityEvents, 60000); });
</script>

</body>
</html>
