    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;

<body class="bg-background font-body-md text-on-surface overflow-hidden">

<div class="flex h-screen w-full overflow-hidden">
    <aside th:replace="~{layouts/financeAdminLayout :: sidebar('chartOfAccounts')}"></aside>

    <div class="flex flex-col flex-1 min-w-0 h-screen overflow-hidden">

        <!-- Local Top Navigation Bar (Full Code Intact) -->
        <header class="bg-surface dark:bg-surface-container-low w-full h-16 border-b border-outline-variant dark:border-on-surface-variant flex justify-between items-center px-outer-padding z-50 shrink-0">
            <div class="flex items-center gap-4">
                <span class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed">Chart Of Account</span>
            </div>
            <div class="flex items-center gap-stack-md">
                <button class="p-2 rounded-full hover:bg-surface-container-low dark:hover:bg-surface-container-high transition-colors duration-200">
                    <span class="material-symbols-outlined text-on-surface-variant">notifications</span>
                </button>
                <button class="p-2 rounded-full hover:bg-surface-container-low dark:hover:bg-surface-container-high transition-colors duration-200">
                    <span class="material-symbols-outlined text-on-surface-variant">settings</span>
                </button>
                <div class="h-8 w-8 rounded-full overflow-hidden border border-outline-variant">
                    <img class="w-full h-full object-cover" data-alt="A professional headshot of a financial executive in a minimalist studio setting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCHk8Lbuo4lkDdlodAivlroXp-XDrAXrRT1A5uy3nVz7hcVehNcLSM0jnKFInOaRK3ei7oUUCK2oybbEsvDzLjNHsam5yv9IAdIWdgBt60FzRbeVEljclmlxBNqYUnA9RccE-bzadrFy_G3ZoNQfJGJDN2w8KqqOfXBvmZF0AjMdMu9_Ej-9mZEmWInfEAvIphJAvaXm-_VWfKOrdo1GfzygFoiiZK7ui8wpMBIM8R73T5yLasQQwpSu24TgqgPvm85Tfllpbr0YMc">
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-outer-padding">

            <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-card-padding shadow-sm">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-gutter gap-4">
                    <div class="relative w-full md:w-96">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-secondary">search</span>
                        <input class="w-full pl-10 pr-4 py-2 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-1 focus:ring-primary focus:border-primary outline-none text-body-sm transition-all" placeholder="Search account codes or names..." type="text">
                    </div>
                    <button class="bg-primary text-on-primary px-6 py-2.5 rounded-lg font-bold flex items-center gap-2 hover:opacity-90 active:scale-95 transition-all text-body-md">
                        <span class="material-symbols-outlined text-[20px]">add</span>
                        Add New Account Code
                    </button>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                        <tr class="bg-surface-container-low">
                            <th class="px-4 py-3 font-label-md text-label-md text-secondary uppercase tracking-wider border-b border-outline-variant">Account Code</th>
                            <th class="px-4 py-3 font-label-md text-label-md text-secondary uppercase tracking-wider border-b border-outline-variant">Account Name</th>
                            <th class="px-4 py-3 font-label-md text-label-md text-secondary uppercase tracking-wider border-b border-outline-variant">Classification</th>
                            <th class="px-4 py-3 font-label-md text-label-md text-secondary uppercase tracking-wider border-b border-outline-variant text-right">Status</th>
                            <th class="px-4 py-3 font-label-md text-label-md text-secondary uppercase tracking-wider border-b border-outline-variant text-right">Actions</th>
                        </tr>
                        </thead>
                        <tbody class="divide-y divide-outline-variant">
                        <tr class="hover:bg-surface-container-low transition-colors duration-150">
                            <td class="px-4 py-4 font-label-md text-primary">1010</td>
                            <td class="px-4 py-4 font-body-md font-semibold">Cash at Bank</td>
                            <td class="px-4 py-4">
                                <span class="px-3 py-1 rounded-full text-[11px] font-bold uppercase tracking-tight bg-blue-100 text-blue-700 border border-blue-200">Asset</span>
                            </td>
                            <td class="px-4 py-4 text-right">
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input checked class="sr-only peer" onchange="toggleStatus(this)" type="checkbox">
                                    <div class="w-10 h-5 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary"></div>
                                </label>
                            </td>
                            <td class="px-4 py-4 text-right">
                                <button class="material-symbols-outlined text-secondary hover:text-primary">more_vert</button>
                            </td>
                        </tr>
                        <tr class="hover:bg-surface-container-low transition-colors duration-150">
                            <td class="px-4 py-4 font-label-md text-primary">2010</td>
                            <td class="px-4 py-4 font-body-md font-semibold">Accounts Payable</td>
                            <td class="px-4 py-4">
                                <span class="px-3 py-1 rounded-full text-[11px] font-bold uppercase tracking-tight bg-red-100 text-error border border-error-container">Liability</span>
                            </td>
                            <td class="px-4 py-4 text-right">
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input checked class="sr-only peer" onchange="toggleStatus(this)" type="checkbox">
                                    <div class="w-10 h-5 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary"></div>
                                </label>
                            </td>
                            <td class="px-4 py-4 text-right">
                                <button class="material-symbols-outlined text-secondary hover:text-primary">more_vert</button>
                            </td>
                        </tr>
                        <tr class="hover:bg-surface-container-low transition-colors duration-150">
                            <td class="px-4 py-4 font-label-md text-primary">3010</td>
                            <td class="px-4 py-4 font-body-md font-semibold">Shareholders Equity</td>
                            <td class="px-4 py-4">
                                <span class="px-3 py-1 rounded-full text-[11px] font-bold uppercase tracking-tight bg-purple-100 text-purple-700 border border-purple-200">Equity</span>
                            </td>
                            <td class="px-4 py-4 text-right">
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input checked class="sr-only peer" onchange="toggleStatus(this)" type="checkbox">
                                    <div class="w-10 h-5 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary"></div>
                                </label>
                            </td>
                            <td class="px-4 py-4 text-right">
                                <button class="material-symbols-outlined text-secondary hover:text-primary">more_vert</button>
                            </td>
                        </tr>
                        <tr class="hover:bg-surface-container-low transition-colors duration-150">
                            <td class="px-4 py-4 font-label-md text-primary">4010</td>
                            <td class="px-4 py-4 font-body-md font-semibold">Service Revenue</td>
                            <td class="px-4 py-4">
                                <span class="px-3 py-1 rounded-full text-[11px] font-bold uppercase tracking-tight bg-teal-100 text-teal-700 border border-teal-200">Income</span>
                            </td>
                            <td class="px-4 py-4 text-right">
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input checked class="sr-only peer" onchange="toggleStatus(this)" type="checkbox">
                                    <div class="w-10 h-5 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary"></div>
                                </label>
                            </td>
                            <td class="px-4 py-4 text-right">
                                <button class="material-symbols-outlined text-secondary hover:text-primary">more_vert</button>
                            </td>
                        </tr>
                        <tr class="hover:bg-surface-container-low transition-colors duration-150">
                            <td class="px-4 py-4 font-label-md text-primary">5010</td>
                            <td class="px-4 py-4 font-body-md font-semibold">Operational Rent</td>
                            <td class="px-4 py-4">
                                <span class="px-3 py-1 rounded-full text-[11px] font-bold uppercase tracking-tight bg-orange-100 text-orange-700 border border-orange-200">Expense</span>
                            </td>
                            <td class="px-4 py-4 text-right">
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input class="sr-only peer" onchange="toggleStatus(this)" type="checkbox">
                                    <div class="w-10 h-5 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary"></div>
                                </label>
                            </td>
                            <td class="px-4 py-4 text-right">
                                <button class="material-symbols-outlined text-secondary hover:text-primary">more_vert</button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="mt-gutter flex flex-col md:flex-row justify-between items-center pt-gutter border-t border-outline-variant">
                    <span class="text-body-sm text-secondary mb-4 md:mb-0">Showing 5 of 124 account definitions</span>
                    <div class="flex items-center gap-2">
                        <button class="p-2 rounded-lg border border-outline-variant hover:bg-surface-container-low transition-colors disabled:opacity-50" disabled>
                            <span class="material-symbols-outlined">chevron_left</span>
                        </button>
                        <button class="px-4 py-1.5 rounded-lg bg-primary text-on-primary font-bold text-body-sm">1</button>
                        <button class="px-4 py-1.5 rounded-lg border border-outline-variant hover:bg-surface-container-low transition-colors text-body-sm">2</button>
                        <button class="px-4 py-1.5 rounded-lg border border-outline-variant hover:bg-surface-container-low transition-colors text-body-sm">3</button>
                        <button class="p-2 rounded-lg border border-outline-variant hover:bg-surface-container-low transition-colors">
                            <span class="material-symbols-outlined">chevron_right</span>
                        </button>
                    </div>
                </div>
            </div>

        </main>
    </div>
</div>

<script>
    function toggleStatus(checkbox) {
        const row = checkbox.closest('tr');
        if (!checkbox.checked) {
            row.classList.add('opacity-60');
            console.log('Account code deactivated.');
        } else {
            row.classList.remove('opacity-60');
            console.log('Account code activated.');
        }
    }
</script>
</body>
</html>
