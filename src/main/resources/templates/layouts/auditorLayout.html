<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
</head>
<body>
<div>

    <aside th:fragment="sidebar" class="w-sidebar-width h-screen fixed left-0 top-0 border-r border-outline-variant bg-surface-container-low flex flex-col py-stack-md z-50">
        <div class="px-6 mb-8 flex items-center gap-3">
            <img alt="AMS Logo" class="w-8 h-8 object-contain" th:src="@{/images/logoams.png}">
            <div>
                <h1 class="text-headline-sm font-headline-sm font-bold text-on-surface leading-tight">AMS</h1>
                <p class="text-label-caps font-label-caps text-on-primary-container">Auditor</p>
            </div>
        </div>
        <nav class="flex-1 px-2 space-y-1">
            <a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-high rounded-lg transition-colors" href="#">
                <span class="material-symbols-outlined">dashboard</span>
                <span class="font-body-md text-body-md">Dashboard</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-high rounded-lg transition-colors" href="#">
                <span class="material-symbols-outlined">gavel</span>
                <span class="font-body-md text-body-md">Governance</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-high rounded-lg transition-colors" href="#">
                <span class="material-symbols-outlined">security</span>
                <span class="font-body-md text-body-md">Forensic Risk Models</span>
            </a>
        </nav>
        <div class="px-4 mt-auto space-y-4">
            <div class="pt-4 border-t border-outline-variant">
                <div class="flex items-center gap-3 p-2 rounded-lg transition-colors flex-col">
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined text-4xl text-on-surface-variant">account_circle</span>
                        <span class="font-body-md text-body-md font-bold text-on-surface">J. Sterling</span>
                    </div>
                    <div class="mt-2 pt-2 border-t border-outline-variant flex items-center gap-3 text-on-surface-variant hover:text-primary cursor-pointer transition-colors">
                        <span class="material-symbols-outlined">logout</span>
                        <span class="font-body-md text-body-md">Logout</span>
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <header th:fragment="header" class="h-20 bg-surface flex justify-between items-center px-margin-page border-b border-outline-variant sticky top-0 z-40">
        <div class="flex items-center gap-8">
            <h2 class="font-headline-md text-headline-md font-bold text-on-background">Financial Governance</h2>
            <nav class="hidden md:flex items-center gap-6"></nav>
        </div>
        <div class="flex items-center gap-4">
            <div class="relative">
                <input class="bg-surface-container-low border border-outline-variant rounded-full px-10 py-2 text-body-md focus:ring-2 focus:ring-secondary focus:outline-none w-64" placeholder="Search entries..." type="text">
                <span class="material-symbols-outlined absolute left-3 top-2.5 text-on-surface-variant">search</span>
            </div>
            <div class="flex items-center gap-2">
                <button class="p-2 text-on-surface-variant hover:bg-surface-container-high rounded-full transition-colors"></button>
            </div>
        </div>
    </header>

</div>
</body>
</html>
