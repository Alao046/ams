<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div xmlns:th="http://www.thymeleaf.org">

    <aside th:fragment="sidebar(activeTab)" class="sticky top-0 w-[260px] h-screen border-r border-outline-variant bg-surface-container-low flex flex-col py-stack-md shrink-0 z-50 overflow-y-auto self-start">
        <div class="px-6 pb-8">
            <img alt="Accounting Management System" class="w-[48px] h-[48px] rounded-lg mb-4" th:src="@{/images/logoams.png}">
            <div>
                <h1 class="font-headline-sm text-headline-sm text-on-surface font-bold">AMS</h1>
                <p class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Accountant</p>
            </div>
        </div>
        <nav class="flex-1 px-2 space-y-1">
            <a th:href="@{/accountant/dashboard}"
               class="flex items-center px-4 py-3 rounded-lg mx-2 my-1 transition-all"
               th:classappend="${activeTab == 'dashboard'} ? 'bg-secondary-fixed text-on-secondary-fixed-variant font-bold' : 'text-on-surface-variant hover:bg-surface-container-high'">
                <span class="material-symbols-outlined mr-3">dashboard</span>
                <span class="font-body-md text-body-md">Dashboard</span>
            </a>

            <a th:href="@{/accountant/manualJournal}"
               class="flex items-center px-4 py-3 rounded-lg mx-2 my-1 transition-all"
               th:classappend="${activeTab == 'manualJournal'} ? 'bg-secondary-fixed text-on-secondary-fixed-variant font-bold' : 'text-on-surface-variant hover:bg-surface-container-high'">
                <span class="material-symbols-outlined mr-3">history_edu</span>
                <span class="font-body-md text-body-md">Manual Journal</span>
            </a>

            <a th:href="@{/accountant/purchaseInvoice}"
               class="flex items-center px-4 py-3 rounded-lg mx-2 my-1 transition-all"
               th:classappend="${activeTab == 'purchaseInvoice'} ? 'bg-secondary-fixed text-on-secondary-fixed-variant font-bold' : 'text-on-surface-variant hover:bg-surface-container-high'">
                <span class="material-symbols-outlined mr-3">receipt_long</span>
                <span class="font-body-md text-body-md">Purchase Invoices</span>
            </a>

            <a th:href="@{/accountant/customerInvoicing}"
               class="flex items-center px-4 py-3 rounded-lg mx-2 my-1 transition-all"
               th:classappend="${activeTab == 'customerInvoicing'} ? 'bg-secondary-fixed text-on-secondary-fixed-variant font-bold' : 'text-on-surface-variant hover:bg-surface-container-high'">
                <span class="material-symbols-outlined mr-3">description</span>
                <span class="font-body-md text-body-md">Customer Invoices</span>
            </a>

            <a th:href="@{/accountant/cashAndBank}"
               class="flex items-center px-4 py-3 rounded-lg mx-2 my-1 transition-all"
               th:classappend="${activeTab == 'cashAndBank'} ? 'bg-secondary-fixed text-on-secondary-fixed-variant font-bold' : 'text-on-surface-variant hover:bg-surface-container-high'">
                <span class="material-symbols-outlined mr-3">account_balance_wallet</span>
                <span class="font-body-md text-body-md">Cash &amp; Bankbook</span>
            </a>

            <a th:href="@{/accountant/fixedAssets}"
               class="flex items-center px-4 py-3 rounded-lg mx-2 my-1 transition-all"
               th:classappend="${activeTab == 'fixedAssets'} ? 'bg-secondary-fixed text-on-secondary-fixed-variant font-bold' : 'text-on-surface-variant hover:bg-surface-container-high'">
                <span class="material-symbols-outlined mr-3">precision_manufacturing</span>
                <span class="font-body-md text-body-md">Fixed Assets</span>
            </a>
        </nav>

        <div class="px-4 mt-auto space-y-4">
            <div class="pt-4 border-t border-outline-variant">
                <div class="flex items-center p-2 hover:bg-surface-container-high rounded-lg cursor-pointer transition-colors">
                    <span class="material-symbols-outlined text-4xl text-on-surface-variant mr-3">account_circle</span>
                    <span class="font-body-md text-body-md text-on-surface font-bold">A. Miller</span>
                </div>
                <a class="flex items-center p-2 mt-1 text-error hover:bg-error-container hover:text-on-error-container rounded-lg transition-colors" th:href="@{/users/logout}">
                    <span class="material-symbols-outlined mr-3">logout</span>
                    <span class="font-label-caps text-label-caps">Logout</span>
                </a>
            </div>
        </div>
    </aside>

</div>
</body>
</html>
