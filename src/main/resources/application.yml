spring:
  # Database Configuration
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/ams}
    username: ${JDBC_DATABASE_USERNAME:postgres}
    password: ${JDBC_DATABASE_PASSWORD:alaopost}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  # Jackson Configuration - ignore unknown properties from Keycloak API
  jackson:
    deserialization:
      fail-on-unknown-properties: false

  # Multipart Upload Configuration
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  # Security & Keycloak Configuration
  security:
    oauth2:
      client:
        provider:
          keycloak:
            issuer-uri: ${ISSUER_URI:https://ngcloak-production.up.railway.app/realms/ams}
            user-name-attribute: preferred_username
        registration:
          keycloak:
            provider: keycloak
            client-id: ${KEYCLOAK_CLIENT_ID:ams}
            client-secret: ${KEYCLOAK_CLIENT_SECRET:YuK5FH9q83qsZhLf61VXDAGGnbITthPX}
            authorization-grant-type: authorization_code
            scope: openid, profile, email

# Flowable BPMN Engine Configuration
flowable:
  async-executor-activate: true
  database-schema-update: true

# Keycloak Admin Configuration
keycloak:
  base-url: ${KEYCLOAK_BASE_URL:https://ngcloak-production.up.railway.app}
  realm: ams
  base-realm: master
  admin-client-id: admin-cli-client
  admin-client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:MXSasVnuHsBodtnuFu69Tp8yyl4EYb4E}
  client-id: ${KEYCLOAK_CLIENT_ID:ams}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:YuK5FH9q83qsZhLf61VXDAGGnbITthPX}

server:
  forward-headers-strategy: native
  tomcat:
    max-part-count: '100'