spring:
  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/ams
    username: postgres
    password: alaopost
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Jackson Configuration - ignore unknown properties from Keycloak API
  jackson:
    deserialization:
      fail-on-unknown-properties: false

  # Security & Keycloak Configuration
  security:
    oauth2:
      client:
        provider:
          keycloak:
            issuer-uri: http://localhost:8080/realms/ams
            user-name-attribute: preferred_username
        registration:
          keycloak:
            provider: keycloak
            client-id: ams
            client-secret: NgmB1BemVnpwbzCo29L2qMCFmuqg2Q8C
            authorization-grant-type: authorization_code
            scope: openid, profile, email

# Flowable BPMN Engine Configuration
flowable:
  async-executor-activate: true
  database-schema-update: true

# Keycloak Admin Configuration
keycloak:
  base-url: ${KEYCLOAK_BASE_URL:http://localhost:8080}
  realm: ams
  base-realm: master
  admin-client-id: admin-cli-client
  admin-client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:2WFVHBXQXDWS3rV47I5XI4YrPsI3rxiq}
  client-id: ams
  client-secret: ${KEYCLOAK_CLIENT_SECRET:NgmB1BemVnpwbzCo29L2qMCFmuqg2Q8C}